name: Backend Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          TESTING: "1"
          SKIP_INIT_DB: "1"
        run: |
          pip install pytest pytest-cov httpx
          python -m pytest tests/ -v --tb=short --ignore=tests/test_auth.py --ignore=tests/test_billing.py --ignore=tests/test_dashboard.py

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            cd backend
            source venv/bin/activate || python3 -m venv venv && source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart sentinel-backend

      - name: Health Check
        run: |
          sleep 10
          curl -f ${{ secrets.SERVER_URL }}/health || exit 1

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Backend deployed successfully to ${{ secrets.SERVER_URL }}"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Backend deployment failed!"
