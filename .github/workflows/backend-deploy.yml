name: Backend Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          TESTING: "1"
          SKIP_INIT_DB: "1"
        run: |
          pip install pytest pytest-cov httpx
          python -m pytest tests/ -v --tb=short --ignore=tests/test_auth.py --ignore=tests/test_billing.py --ignore=tests/test_dashboard.py

  deploy-justrunmy:
    name: Deploy to JustRunMy.App
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy backend subtree
        env:
          JUSTRUNMY_GIT_URL: ${{ secrets.JUSTRUNMY_GIT_URL }}
        run: |
          if [ -z "$JUSTRUNMY_GIT_URL" ]; then
            echo "JUSTRUNMY_GIT_URL secret is not set; skipping deploy."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git subtree split --prefix=backend -b justrunmy-deploy
          git push -f "$JUSTRUNMY_GIT_URL" justrunmy-deploy:deploy

      - name: Wait for deployment
        run: sleep 45

      - name: Health Check
        run: |
          curl -f https://gitr_g6pdx-727.b.jrnm.app/health || exit 1

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Backend deployed successfully to JustRunMy.App"
          echo "🔗 URL: https://gitr_g6pdx-727.b.jrnm.app"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Backend deployment failed!"
