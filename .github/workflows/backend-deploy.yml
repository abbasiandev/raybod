name: Backend Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          TESTING: "1"
          SKIP_INIT_DB: "1"
        run: |
          pip install pytest pytest-cov httpx
          python -m pytest tests/ -v --tb=short --ignore=tests/test_auth.py --ignore=tests/test_billing.py --ignore=tests/test_dashboard.py

  deploy-liara:
    name: Deploy to Liara
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Liara
        working-directory: ./backend
        env:
          LIARA_API_TOKEN: ${{ secrets.LIARA_API_TOKEN }}
        run: |
          # Install Liara CLI
          npm install -g @liara/cli
          
          # Deploy using API token
          liara deploy --api-token="$LIARA_API_TOKEN" --app=codekhoda-sentinel --port=8000 --platform=docker --detach

      - name: Wait for deployment
        run: sleep 30

      - name: Health Check
        run: |
          curl -f https://codekhoda-sentinel.liara.run/health || exit 1

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Backend deployed successfully to Liara"
          echo "🔗 URL: https://codekhoda-sentinel.liara.run"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Backend deployment to Liara failed!"
