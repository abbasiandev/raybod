name: Android CI

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-android:
    name: Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Run tests
        working-directory: ./android
        run: ./gradlew test --stacktrace --no-daemon --continue

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-reports
          path: android/**/build/reports/tests/
          retention-days: 7

  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    needs: [ test-android ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Read app version
        id: version
        working-directory: ./android
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed -E 's/.*= ([0-9]+).*/\1/')
          TAG="v${VERSION_NAME}-build.${GITHUB_RUN_NUMBER}"
          APK_NAME="raybod-${VERSION_NAME}-build${GITHUB_RUN_NUMBER}.apk"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build signed release APK
        working-directory: ./android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Prepare release APK
        run: |
          APK_PATH=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK_PATH" "android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Raybod ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.tag }})
          body: |
            Signed release APK for Raybod Android app.

            - Version name: `${{ steps.version.outputs.version_name }}`
            - Version code: `${{ steps.version.outputs.version_code }}`
            - Backend: `https://gitr_g6pdx-727.b.jrnm.app/`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          generate_release_notes: true
