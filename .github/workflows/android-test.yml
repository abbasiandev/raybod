name: Android Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/android-test.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Run unit tests only
        working-directory: ./android
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon --continue
