{% extends "base.html" %}

{% block title %}Users{% endblock %}
{% block page_title %}User Management{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">Create User</h3>
    </div>
    <div class="card-body">
        <form action="/dashboard/users" method="POST" class="d-flex gap-2 flex-wrap">
            <input type="text" name="username" class="form-input" placeholder="Username" required
                style="flex: 1; min-width: 150px;">
            <input type="password" name="password" class="form-input" placeholder="Password" required
                style="flex: 1; min-width: 150px;">
            <select name="role_id" class="form-input form-select" style="flex: 1; min-width: 150px;">
                {% for role in roles %}
                <option value="{{ role.id }}">{{ role.name | replace('_', ' ') | title }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary">
                👤 Create User
            </button>
        </form>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header">
        <h3 class="card-title">All Users</h3>
        <span class="badge badge-info">{{ users | length }} users</span>
    </div>
    <div id="users-table">
        {% include "dashboard/partials/users_table.html" %}
    </div>
</div>
{% endblock %}
