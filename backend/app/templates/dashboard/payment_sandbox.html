<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Payment Sandbox - Sentinel</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        body {
            background: #010409;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .sandbox-card {
            background: #161B22;
            border: 1px solid #30363D;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
        }
        .plan-badge {
            display: inline-block;
            background: #00E5FF;
            color: #010409;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="sandbox-card">
        <div class="logo mb-2" style="justify-content: center;">
            <span class="logo-icon">🦅</span>
            <span class="logo-text">SENTINEL PAY</span>
        </div>
        <div class="plan-badge">{{ plan }}</div>
        <h1 class="mb-2">Payment Sandbox</h1>
        <p class="text-secondary mb-3">
            This is a <strong>DEBUG</strong> payment page. In a production environment, this would be replaced by a real payment processor like Stripe or Google Play.
        </p>

        <div class="d-flex flex-wrap gap-2 justify-between">
            <form action="/dashboard/billing/verify" method="POST" style="flex: 1;">
                <input type="hidden" name="plan" value="{{ plan }}">
                <input type="hidden" name="success" value="true">
                <button type="submit" class="btn btn-primary w-100" style="background: var(--status-safe);">
                    SIMULATE SUCCESS
                </button>
            </form>

            <form action="/dashboard/billing/verify" method="POST" style="flex: 1;">
                <input type="hidden" name="plan" value="{{ plan }}">
                <input type="hidden" name="success" value="false">
                <button type="submit" class="btn btn-danger w-100">
                    SIMULATE FAILURE
                </button>
            </form>
        </div>
        
        <div class="mt-3">
            <a href="/dashboard/billing" class="text-secondary" style="text-decoration: none;">Cancel and Go Back</a>
        </div>
    </div>
</body>
</html>
