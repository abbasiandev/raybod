<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/landing.css">
</head>

<body>
    <div class="sandbox-container">
        <h2>🔒 Secure Payment (Sandbox)</h2>
        <p>Merchant: <strong>Hybrid Cloud Sentinel</strong></p>
        <div class="price">$4.99</div>
        <p>This is a simulated payment page for testing purposes.</p>

        <div class="card-mockup"
            style="background: #2a2a35; padding: 1rem; border-radius: 4px; margin: 2rem 0; text-align: left;">
            <div style="margin-bottom: 10px; color: #888; font-size: 0.8rem;">Card Number</div>
            <div style="font-family: monospace; letter-spacing: 2px;">4242 4242 4242 4242</div>
        </div>

        <div class="debug-controls">
            <form action="/api/v1/public/payment/process" method="POST">
                <input type="hidden" name="session_id" value="{{ session_id }}">
                <input type="hidden" name="success" value="true">
                <button type="submit" class="btn btn-success">Paid</button>
            </form>

            <form action="/api/v1/public/payment/process" method="POST">
                <input type="hidden" name="session_id" value="{{ session_id }}">
                <input type="hidden" name="success" value="false">
                <button type="submit" class="btn btn-fail">Not Paid</button>
            </form>
        </div>
    </div>
</body>

</html>
